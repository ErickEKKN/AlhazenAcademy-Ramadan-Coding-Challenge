<html>
    <head>
        <title>Kalkulator Zakat</title>
        <link href="styles.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <header class="calc-header">
            <h1>Kalkulator Zakat</h1>
            <p class="header-sub">Hitung kewajiban zakat Anda dengan mudah dan akurat</p>
            <div class="zakat-type-wrap">
                <label for="zakat-type" class="type-label">Pilih Jenis Zakat</label>
                <div class="select-wrapper">
                    <select id="zakat-type" class="zakat-select">
                        <option value="penghasilan">Zakat Penghasilan</option>
                        <option value="emas">Zakat Emas</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="container calc-main">
            <section class="calc-section">
                <article class="calc-card">
                    <h2 class="card-title">
                        <span class="card-icon">📋</span>
                        Data Perhitungan
                    </h2>
                    <div class="form-group">
                        <label class="form-label" for="gold-price">
                            Harga Emas per Gram
                            <span class="form-hint">Gunakan harga emas hari ini</span>
                        </label>
                        <div class="input-prefix-wrap">
                            <span class="input-prefix">Rp</span>
                            <input type="number" id="gold-price" class="form-input"
                                placeholder="Contoh: 1.580.000" min="0">
                        </div>
                    </div>
                    <div id="form-penghasilan" class="dynamic-form">
                        <div class="form-group">
                            <label class="form-label" for="salary">
                                Gaji / Pendapatan Pokok
                                <span class="form-hint">Per bulan atau per tahun</span>
                            </label>
                            <div class="input-prefix-wrap">
                                <span class="input-prefix">Rp</span>
                                <input type="number" id="salary" class="form-input"
                                    placeholder="Masukkan gaji Anda" min="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="other-income">
                                Penghasilan Lain-lain
                                <span class="form-hint">Bonus, freelance, dll. (isi 0 jika tidak ada)</span>
                            </label>
                            <div class="input-prefix-wrap">
                                <span class="input-prefix">Rp</span>
                                <input type="number" id="other-income" class="form-input"
                                    placeholder="Masukkan penghasilan lain" min="0">
                            </div>
                        </div>
                    </div>

                    <div id="form-emas" class="dynamic-form" style="display:none">
                        <div class="form-group">
                            <label class="form-label" for="gold-amount">
                                Total Kepemilikan Emas
                                <span class="form-hint">Jumlah seluruh emas yang dimiliki</span>
                            </label>
                            <div class="input-prefix-wrap">
                                <span class="input-prefix">gr</span>
                                <input type="number" id="gold-amount" class="form-input"
                                    placeholder="Masukkan jumlah emas (gram)" min="0" step="0.01">
                            </div>
                        </div>
                    </div>

                    <div id="form-error" class="form-error" style="display:none"></div>

                    <button id="calculate-btn" class="calc-btn">
                        <span>Hitung Zakat</span>
                    </button>
                </article>
            </section>

            <section class="calc-section result-wrapper" id="result-section" style="display:none">
                <article class="calc-card result-card">
                    <h2 class="card-title">
                        <span class="card-icon">📊</span>
                        Hasil Perhitungan
                    </h2>

                    <div class="result-type-badge" id="result-type-badge"></div>

                    <div class="result-box">
                        <div class="result-row">
                            <span class="result-label">Total Harta</span>
                            <span class="result-value" id="result-total">Rp 0</span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Nisab (85 gram emas)</span>
                            <span class="result-value" id="result-nisab">Rp 0</span>
                        </div>
                        <div class="result-row result-status-row">
                            <span class="result-label">Status Zakat</span>
                            <span id="result-status" class="status-badge">–</span>
                        </div>
                        <div class="result-row result-highlight">
                            <span class="result-label-bold">Zakat yang Harus Dibayar</span>
                            <span class="result-value-bold" id="result-zakat">Rp 0</span>
                        </div>
                    </div>

                    <div id="result-note" class="result-note"></div>

                    <button id="reset-btn" class="reset-btn">Hitung Ulang</button>
                </article>
            </section>

        </main>

        <footer>
            <p>Dalam rangka memperingati bulan Ramadan 1447 H</p>
        </footer>

        <script src="main.js"></script>
    </body>
</html>
