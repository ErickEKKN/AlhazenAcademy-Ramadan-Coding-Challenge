<!DOCTYPE html>
<html lang="id">
    <head>
        <title>Baca Qur'an - Ramadhan To-Do List</title>
        <link href="../styles.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
    </head>

    <body>
        <header class="page-header">
            <a href="../index.html"><img src="../assets/logo.svg" alt="Ramadan Logo"></a>
            <h1>Baca Qur'an</h1>
        </header>

        <div class="page-wrapper">
            <nav class="navbar">
                <span class="nav-pill"></span>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../shalat/index.html">Shalat Wajib</a></li>
                    <li><a href="index.html" class="active">Baca Qur'an</a></li>
                    <li><a href="../puasa/index.html">Puasa</a></li>
                    <li><a href="../dzikir/index.html">Dzikir</a></li>
                </ul>
            </nav>

            <div class="daily-summary">
                <h2>Ringkasan Progress Harian</h2>
                <div class="progress-info">
                    <span class="progress-label" style="color:#e8d89a;">Baca Qur'an Hari Ini</span>
                    <span class="progress-pct" style="color:#f0d080;" id="quran-pct">0%</span>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar" id="quran-bar"></div>
                </div>
                <div class="motivation-box" id="quran-status">
                    Masukkan target dan halaman yang sudah dibaca.
                </div>
            </div>

            <div class="feature-card">
                <div class="feature-card-title">Tracker Baca Qur'an</div>

                <div class="quran-inputs">
                    <div class="input-group">
                        <label for="target-halaman">Target Halaman</label>
                        <input type="number" id="target-halaman" min="1" max="604" placeholder="mis. 20">
                    </div>
                    <div class="input-group">
                        <label for="dibaca-halaman">Halaman Dibaca</label>
                        <input type="number" id="dibaca-halaman" min="0" max="604" placeholder="mis. 14">
                    </div>
                </div>

                <div class="mark-done-wrap">
                    <input type="checkbox" id="mark-done">
                    <label for="mark-done">Tandai target selesai hari ini</label>
                </div>

                <div class="progress-info" style="margin-bottom:8px;">
                    <span class="progress-label">Progress Membaca</span>
                    <span class="progress-pct" id="quran-progress-pct">0%</span>
                </div>
                <div class="progress-bar-wrap" style="height:14px;margin-bottom:16px;">
                    <div class="progress-bar" id="quran-progress-bar"></div>
                </div>
                <div class="status-text status-low" id="quran-status-detail" style="margin-bottom:20px;">
                    Masukkan data untuk melihat progress
                </div>

                <button class="save-btn" onclick="saveQuran()">Simpan</button>
            </div>
        </div>

        <footer>
            <p>Dalam rangka memperingati bulan Ramadan 1447 H</p>
        </footer>

        <script>
            const TODAY_KEY = 'quran_' + new Date().toISOString().split('T')[0];

            function calcPct() {
                if (document.getElementById('mark-done').checked) return 100;
                const target = parseInt(document.getElementById('target-halaman').value) || 0;
                const dibaca = parseInt(document.getElementById('dibaca-halaman').value) || 0;
                if (target <= 0) return 0;
                return Math.min(100, Math.round((dibaca / target) * 100));
            }

            function updateUI() {
                const pct = calcPct();
                document.getElementById('quran-progress-pct').textContent = pct + '%';
                document.getElementById('quran-progress-bar').style.width = pct + '%';
                document.getElementById('quran-pct').textContent = pct + '%';
                document.getElementById('quran-bar').style.width = pct + '%';

                const statusDetail  = document.getElementById('quran-status-detail');
                const statusSummary = document.getElementById('quran-status');

                if (pct < 50) {
                    statusDetail.textContent  = 'Masih bisa ditambah - yuk terus membaca!';
                    statusDetail.className    = 'status-text status-low';
                    statusSummary.textContent = 'Masih bisa ditambah - yuk membaca lebih banyak!';
                } else if (pct < 100) {
                    statusDetail.textContent  = 'Hampir selesai - selesaikan targetmu!';
                    statusDetail.className    = 'status-text status-mid';
                    statusSummary.textContent = 'Hampir selesai! Sedikit lagi mencapai target.';
                } else {
                    statusDetail.textContent  = 'Target tercapai! MasyaAllah.';
                    statusDetail.className    = 'status-text status-done';
                    statusSummary.textContent = 'Target tercapai! Alhamdulillah.';
                }
            }

            function loadQuran() {
                const saved = JSON.parse(localStorage.getItem(TODAY_KEY) || 'null');
                if (saved) {
                    document.getElementById('target-halaman').value = saved.target || '';
                    document.getElementById('dibaca-halaman').value = saved.dibaca || '';
                    document.getElementById('mark-done').checked    = !!saved.done;
                }
                updateUI();
            }

            function saveQuran() {
                const target = parseInt(document.getElementById('target-halaman').value) || 0;
                const dibaca = parseInt(document.getElementById('dibaca-halaman').value) || 0;
                const done   = document.getElementById('mark-done').checked;
                localStorage.setItem(TODAY_KEY, JSON.stringify({ target, dibaca, done }));
                showToast("Progress Qur'an tersimpan.");
                updateUI();
            }

            function showToast(msg) {
                let c = document.querySelector('.toast-container');
                if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                c.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }

            document.getElementById('target-halaman').addEventListener('input', updateUI);
            document.getElementById('dibaca-halaman').addEventListener('input', updateUI);
            document.getElementById('mark-done').addEventListener('change', updateUI);

            loadQuran();

            (function() {
                var nav = document.querySelector('.navbar');
                var pill = document.querySelector('.nav-pill');
                var active = document.querySelector('.navbar a.active');
                function movePill(el, animate) {
                    if (!pill || !nav || !el) return;
                    var nr = nav.getBoundingClientRect();
                    var er = el.getBoundingClientRect();
                    if (!animate) pill.style.transition = 'none';
                    pill.style.left   = (er.left - nr.left) + 'px';
                    pill.style.top    = (er.top  - nr.top)  + 'px';
                    pill.style.width  = er.width  + 'px';
                    pill.style.height = er.height + 'px';
                    pill.classList.add('visible');
                    if (!animate) requestAnimationFrame(function() { requestAnimationFrame(function() { pill.style.transition = ''; }); });
                }
                if (active) movePill(active, false);
                document.querySelectorAll('.navbar a').forEach(function(link) {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        var href = this.getAttribute('href');
                        var cur = document.querySelector('.navbar a.active');
                        if (cur) {
                            cur.classList.remove('active');
                            this.classList.add('active');
                            movePill(this, true);
                            setTimeout(function() { window.location.href = href; }, 490);
                        } else {
                            window.location.href = href;
                        }
                    });
                });
            })();
        </script>
    </body>
</html>
